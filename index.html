<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quinn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Figtree:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>

/* ── Reset ──────────────────────────────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
button { cursor: pointer; font: inherit; }
textarea { font: inherit; }

/* ── Tokens ─────────────────────────────────────────────────────────────────── */
:root {
  --bg:         #07070f;
  --surface:    #0c0c1a;
  --surface-2:  #111126;
  --border:     #18182e;
  --border-2:   #222240;
  --text:       #dcdcec;
  --text-2:     #7070a0;
  --text-3:     #32324e;
  /* accent is set dynamically from JS — Quinn's live hue */
  --accent:         hsl(200, 52%, 52%);
  --accent-dim:     hsl(200, 30%, 16%);
  --accent-subtle:  hsl(200, 20%, 12%);
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Figtree', sans-serif;
  font-size: 15px;
  line-height: 1.6;
  overflow: hidden;
}

/* ── View system ────────────────────────────────────────────────────────────── */
.view {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
  will-change: opacity;
}
.view.active { opacity: 1; pointer-events: all; }

/* ── Quinn canvas ───────────────────────────────────────────────────────────── */
#quinn-cv {
  display: block;
  /* rendered at 420×420 — CSS size set per view */
  flex-shrink: 0;
}

.quinn-stage {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* ════════════════════════════════════════════════════════════════════════════
   SIGN-IN VIEW
   ════════════════════════════════════════════════════════════════════════════ */
#view-signin {
  align-items: center;
  justify-content: center;
}

#view-signin .quinn-stage { margin-bottom: 10px; }

.signin-wordmark {
  font-family: 'Syne', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.38em;
  text-transform: uppercase;
  color: var(--text-2);
  margin-bottom: 36px;
}

.signin-form {
  width: 100%;
  max-width: 320px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* Field wrapper — floats label up on focus/filled */
.field {
  position: relative;
  display: flex;
  flex-direction: column;
}

.field label {
  font-family: 'Syne', sans-serif;
  font-size: 0.56rem;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 7px;
  transition: color 0.2s;
}

.field:focus-within label { color: var(--text-2); }

.field-inner {
  position: relative;
  display: flex;
  align-items: center;
}

.field input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border-2);
  border-radius: 8px;
  padding: 11px 14px;
  color: var(--text);
  font-family: 'Figtree', sans-serif;
  font-size: 0.92rem;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  -webkit-appearance: none;
}
.field input::placeholder { color: var(--text-3); }
.field input:focus {
  border-color: var(--accent);
  background: var(--surface-2);
}

/* Password show/hide toggle */
.pwd-toggle {
  position: absolute; right: 12px;
  background: none; border: none;
  color: var(--text-3);
  font-size: 0.75rem;
  font-family: 'Syne', sans-serif;
  letter-spacing: 0.08em;
  padding: 2px 4px;
  transition: color 0.2s;
  line-height: 1;
}
.pwd-toggle:hover { color: var(--text-2); }
.field input[type="password"] { padding-right: 52px; }

.signin-error {
  font-family: 'Syne', sans-serif;
  font-size: 0.58rem;
  letter-spacing: 0.1em;
  color: hsl(0, 60%, 55%);
  min-height: 1.2em;
  padding-left: 2px;
}

.signin-btn {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  color: #07070f;
  font-family: 'Syne', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 4px;
  transition: opacity 0.2s, transform 0.15s;
}
.signin-btn:hover  { opacity: 0.88; }
.signin-btn:active { transform: scale(0.98); }

.signin-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 6px;
}

.signin-footer-link {
  background: none; border: none;
  color: var(--text-3);
  font-family: 'Syne', sans-serif;
  font-size: 0.56rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  transition: color 0.2s;
  padding: 0;
}
.signin-footer-link:hover { color: var(--text-2); }

/* ════════════════════════════════════════════════════════════════════════════
   CHAT VIEW  (also used as base for meet-greet)
   ════════════════════════════════════════════════════════════════════════════ */
.chat-header {
  display: flex; align-items: center;
  padding: 18px 22px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; gap: 12px;
}

.back-btn {
  background: none; border: none;
  color: var(--text-3);
  font-size: 1.1rem;
  padding: 2px 4px;
  transition: color 0.2s;
  line-height: 1;
}
.back-btn:hover { color: var(--text-2); }

.header-kid-name {
  font-family: 'Syne', sans-serif;
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--text-2);
}

.header-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  margin-left: auto;
  transition: background 0.8s ease;
}

#view-chat .quinn-stage,
#view-meetgreet .quinn-stage {
  padding: 12px 0 4px;
}

.messages {
  overflow-y: auto;
  padding: 12px 26px 4px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  max-height: 32vh;
  scrollbar-width: thin;
  scrollbar-color: var(--border-2) transparent;
}

/* Quinn messages — left border in live accent color */
.msg-quinn {
  max-width: 70%;
  padding: 8px 0 8px 14px;
  border-left: 2px solid var(--accent);
  margin-bottom: 8px;
  transition: border-color 0.8s ease;
}
.msg-quinn .msg-text {
  font-size: 0.93rem;
  color: var(--text);
  line-height: 1.68;
}
.msg-quinn .msg-time {
  font-family: 'Syne', sans-serif;
  font-size: 0.52rem;
  letter-spacing: 0.12em;
  color: var(--text-3);
  margin-top: 5px;
}

/* Kid messages — right-aligned */
.msg-kid {
  display: flex; flex-direction: column; align-items: flex-end;
  align-self: flex-end;
  max-width: 62%;
  margin-bottom: 8px;
}
.msg-kid .msg-text {
  font-size: 0.9rem;
  color: var(--text-2);
  text-align: right;
  line-height: 1.62;
}
.msg-kid .msg-time {
  font-family: 'Syne', sans-serif;
  font-size: 0.52rem;
  letter-spacing: 0.12em;
  color: var(--text-3);
  margin-top: 5px;
}

/* Thinking indicator */
.msg-thinking {
  max-width: 70%;
  padding: 10px 0 10px 14px;
  border-left: 2px solid var(--border-2);
  margin-bottom: 8px;
}
.thinking-dots {
  display: flex; gap: 5px; align-items: center; height: 18px;
}
.thinking-dots span {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--text-3);
  animation: dot-pulse 1.4s ease-in-out infinite;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-pulse {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* Input bar */
.quinn-spacer { flex: 1; min-height: 0; }

.input-bar {
  display: flex; align-items: flex-end; gap: 10px;
  padding: 14px 18px 20px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.chat-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border-2);
  border-radius: 20px;
  padding: 10px 16px;
  color: var(--text);
  font-size: 0.88rem;
  outline: none;
  resize: none;
  line-height: 1.5;
  max-height: 96px;
  overflow-y: auto;
  transition: border-color 0.2s;
  scrollbar-width: none;
}
.chat-input::placeholder { color: var(--text-3); }
.chat-input:focus { border-color: var(--accent); }

.send-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: 1px solid var(--border-2);
  background: transparent;
  color: var(--text-3);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 1rem;
  line-height: 1;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
}
.send-btn:hover {
  border-color: var(--accent);
  color: var(--text);
  background: var(--accent-dim);
}

/* ════════════════════════════════════════════════════════════════════════════
   PARENT DASHBOARD
   ════════════════════════════════════════════════════════════════════════════ */
#view-parent { overflow-y: auto; }

.parent-header {
  display: flex; align-items: center; gap: 14px;
  padding: 20px 26px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: sticky; top: 0;
  background: var(--bg);
  z-index: 10;
}

.parent-title {
  font-family: 'Syne', sans-serif;
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--text-2);
}

.parent-body { padding: 32px 26px 48px; display: flex; flex-direction: column; gap: 40px; }

.section-label {
  font-family: 'Syne', sans-serif;
  font-size: 0.55rem;
  font-weight: 600;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 14px;
}

/* Kid cards */
.kid-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 14px;
}

.kid-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 20px 18px;
  transition: border-color 0.2s;
}
.kid-card:hover { border-color: var(--border-2); }

.kid-card-name {
  font-family: 'Syne', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text);
  margin-bottom: 3px;
}
.kid-card-meta {
  font-family: 'Syne', sans-serif;
  font-size: 0.55rem;
  letter-spacing: 0.12em;
  color: var(--text-3);
  margin-bottom: 18px;
}
.subject-row {
  display: flex; align-items: center; gap: 9px;
  font-size: 0.75rem; color: var(--text-2);
  margin-bottom: 8px;
}
.subject-label { min-width: 72px; font-size: 0.75rem; }
.bar-bg {
  flex: 1; height: 2px;
  background: var(--surface-2);
  border-radius: 2px; overflow: hidden;
}
.bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: background 1s ease;
}
.bar-pct {
  font-family: 'Syne', sans-serif;
  font-size: 0.55rem;
  letter-spacing: 0.08em;
  color: var(--text-3);
  min-width: 26px;
  text-align: right;
}
.kid-card-last {
  font-family: 'Syne', sans-serif;
  font-size: 0.52rem; letter-spacing: 0.1em;
  color: var(--text-3);
  margin-top: 14px;
}

/* Exam list */
.exam-list { display: flex; flex-direction: column; gap: 8px; }

.exam-item {
  display: flex; align-items: center; gap: 16px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
}
.exam-date {
  font-family: 'Syne', sans-serif;
  font-size: 0.57rem; font-weight: 600;
  letter-spacing: 0.15em;
  color: var(--accent);
  min-width: 52px;
  transition: color 1s ease;
}
.exam-subject { font-size: 0.82rem; color: var(--text); }
.exam-who {
  font-family: 'Syne', sans-serif;
  font-size: 0.55rem; letter-spacing: 0.1em;
  color: var(--text-3);
  margin-left: auto;
}

/* ── Parent dashboard — dynamic components ───────────────────────────────── */
.parent-loading {
  color: var(--text-3);
  font-family: 'Syne', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  text-align: center;
  padding: 48px 0;
}

.kid-sections { display: flex; flex-direction: column; gap: 14px; }

.kid-section { display: flex; flex-direction: column; }

.kid-card-header {
  display: flex; align-items: flex-start;
  justify-content: space-between; margin-bottom: 4px;
}

.exam-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.exam-pill {
  font-family: 'Syne', sans-serif;
  font-size: 0.5rem; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 8px; border-radius: 4px;
  background: var(--accent-dim); color: var(--accent);
  border: 1px solid var(--accent-subtle); white-space: nowrap;
  transition: background 0.8s ease, color 0.8s ease, border-color 0.8s ease;
}

.btn-detail-toggle {
  flex-shrink: 0;
  background: none; border: 1px solid var(--border-2); border-radius: 5px;
  color: var(--text-3);
  font-family: 'Syne', sans-serif; font-size: 0.5rem; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 4px 10px;
  transition: border-color 0.2s, color 0.2s;
}
.btn-detail-toggle:hover { border-color: var(--accent); color: var(--text-2); }
.btn-detail-toggle.open { border-color: var(--accent); color: var(--accent); }
.kid-card.detail-open { border-radius: 12px 12px 0 0; }

.kid-detail {
  background: var(--surface); border: 1px solid var(--border);
  border-top: none; border-radius: 0 0 12px 12px;
  padding: 20px; display: flex; flex-direction: column; gap: 22px;
}

.detail-section { display: flex; flex-direction: column; gap: 8px; }

.section-sub-label {
  font-family: 'Syne', sans-serif; font-size: 0.52rem; font-weight: 600;
  letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-3);
}

.exam-mgmt-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 6px;
}
.exam-mgmt-date {
  font-family: 'Syne', sans-serif; font-size: 0.54rem; font-weight: 600;
  letter-spacing: 0.12em; color: var(--accent); min-width: 46px;
  transition: color 0.8s ease;
}
.exam-mgmt-subject { font-size: 0.82rem; color: var(--text); flex: 1; }
.exam-mgmt-type {
  font-family: 'Syne', sans-serif; font-size: 0.5rem;
  letter-spacing: 0.08em; color: var(--text-3); text-transform: capitalize;
}

.btn-sm {
  background: none; border: 1px solid var(--border-2); border-radius: 4px;
  color: var(--text-3); font-family: 'Syne', sans-serif;
  font-size: 0.48rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 3px 7px; transition: border-color 0.2s, color 0.2s; cursor: pointer; flex-shrink: 0;
}
.btn-sm-danger:hover { border-color: hsl(0,55%,52%); color: hsl(0,55%,52%); }

.add-exam-toggle {
  background: none; border: 1px dashed var(--border-2); border-radius: 6px;
  color: var(--text-3); font-family: 'Syne', sans-serif;
  font-size: 0.5rem; letter-spacing: 0.12em; text-transform: uppercase;
  padding: 7px; width: 100%; text-align: center;
  transition: border-color 0.2s, color 0.2s; cursor: pointer;
}
.add-exam-toggle:hover { border-color: var(--accent); color: var(--text-2); }
.add-exam-form { display: none; flex-direction: column; gap: 8px; margin-top: 2px; }
.add-exam-form.open { display: flex; }
.form-row { display: flex; gap: 8px; }

.dash-input {
  background: var(--surface-2); border: 1px solid var(--border-2);
  border-radius: 6px; padding: 8px 11px; color: var(--text);
  font-family: 'Figtree', sans-serif; font-size: 0.82rem;
  outline: none; width: 100%; transition: border-color 0.2s;
}
.dash-input:focus { border-color: var(--accent); }
.dash-input::placeholder { color: var(--text-3); }

.dash-select {
  background: var(--surface-2); border: 1px solid var(--border-2);
  border-radius: 6px; padding: 8px 11px; color: var(--text);
  font-family: 'Figtree', sans-serif; font-size: 0.82rem;
  outline: none; cursor: pointer; transition: border-color 0.2s;
}

.btn-primary-sm {
  background: var(--accent); border: none; border-radius: 6px;
  color: #07070f; font-family: 'Syne', sans-serif;
  font-size: 0.58rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
  padding: 8px 14px; white-space: nowrap; transition: opacity 0.2s; cursor: pointer;
  flex-shrink: 0;
}
.btn-primary-sm:hover { opacity: 0.85; }

.material-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px;
}
.material-subject {
  font-family: 'Syne', sans-serif; font-size: 0.5rem; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3);
  min-width: 60px; flex-shrink: 0;
}
.material-name {
  flex: 1; font-size: 0.8rem; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.upload-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
.upload-status {
  font-family: 'Syne', sans-serif; font-size: 0.52rem;
  letter-spacing: 0.1em; color: var(--text-3);
}

.note-item {
  padding: 10px 12px;
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px;
}
.note-text { font-size: 0.82rem; color: var(--text); line-height: 1.6; }
.note-time {
  font-family: 'Syne', sans-serif; font-size: 0.5rem;
  letter-spacing: 0.1em; color: var(--text-3); margin-top: 4px;
}
.note-input {
  background: var(--surface-2); border: 1px solid var(--border-2);
  border-radius: 6px; padding: 10px 12px; color: var(--text);
  font-family: 'Figtree', sans-serif; font-size: 0.82rem; line-height: 1.6;
  outline: none; width: 100%; resize: vertical; min-height: 68px;
  transition: border-color 0.2s;
}
.note-input:focus { border-color: var(--accent); }
.note-input::placeholder { color: var(--text-3); }
.empty-state { color: var(--text-3); font-size: 0.78rem; font-style: italic; }

</style>
</head>
<body>

<!-- ══ SIGN-IN ═══════════════════════════════════════════════════════════════ -->
<div id="view-signin" class="view active">
  <div class="quinn-stage" id="signin-stage"></div>
  <p class="signin-wordmark">Quinn</p>

  <form class="signin-form" onsubmit="handleSignIn(event)">
    <div class="field">
      <label for="signin-email">Email</label>
      <div class="field-inner">
        <input type="email" id="signin-email" placeholder="you@example.com" autocomplete="email" required>
      </div>
    </div>

    <div class="field">
      <label for="signin-password">Password</label>
      <div class="field-inner">
        <input type="password" id="signin-password" placeholder="••••••••" autocomplete="current-password" required>
        <button type="button" class="pwd-toggle" onclick="togglePassword()" id="pwd-toggle-btn">show</button>
      </div>
    </div>

    <div class="signin-error" id="signin-error"></div>

    <button type="submit" class="signin-btn">Sign in</button>

    <div class="signin-footer">
      <button type="button" class="signin-footer-link" onclick="forgotPassword()">Forgot password?</button>
    </div>
  </form>
</div>

<!-- ══ CHAT ══════════════════════════════════════════════════════════════════ -->
<div id="view-chat" class="view">
  <div class="chat-header">
    <button class="back-btn" onclick="signOut()">←</button>
    <span class="header-kid-name" id="chat-kid-label">—</span>
    <div class="header-dot"></div>
  </div>
  <div class="quinn-spacer"></div>
  <div class="quinn-stage" id="chat-stage"></div>
  <div class="messages" id="chat-messages"></div>
  <div class="input-bar">
    <textarea class="chat-input" id="chat-input" rows="1"
      placeholder="Say something…"
      onkeydown="handleKey(event,'chat')"
      oninput="autoGrow(this)"></textarea>
    <button class="send-btn" onclick="sendMessage('chat')">→</button>
  </div>
</div>

<!-- ══ MEET & GREET ══════════════════════════════════════════════════════════ -->
<div id="view-meetgreet" class="view">
  <div class="chat-header">
    <button class="back-btn" onclick="signOut()">←</button>

// ── Auth ──────────────────────────────────────────────────────────────────────

// Core routing logic — shared by handleSignIn and the session-restore check.
async function routeUser(userId, errorEl) {
  const { data: profile, error: profileErr } = await supabase
    .from('profiles').select('*').eq('id', userId).single();

  if (profileErr || !profile) {
    if (errorEl) errorEl.textContent = 'Account setup incomplete. Contact a parent.';
    await supabase.auth.signOut();
    return;
  }

  if (profile.is_parent) { showView('parent'); loadParentDashboard(); return; }

  if (!profile.kid_id) {
    if (errorEl) errorEl.textContent = 'Account setup incomplete. Contact a parent.';
    await supabase.auth.signOut();
    return;
  }

  const { data: kid } = await supabase
    .from('kids').select('*').eq('id', profile.kid_id).single();

  if (!kid) {
    if (errorEl) errorEl.textContent = 'Could not load your profile. Try again.';
    await supabase.auth.signOut();
    return;
  }

  currentKidRecord = kid;
  document.getElementById('chat-kid-label').textContent = kid.name;

  // Check for existing learner profile — determines first-run vs returning kid
  const { data: lp } = await supabase
    .from('learner_profiles').select('*').eq('kid_id', kid.id).single();

  if (!lp) {
    // First visit — route to meet & greet
    document.getElementById('mg-messages').innerHTML = '';
    addQuinnMsg('mg', "Hey — I'm Quinn. I've been looking forward to meeting you.");
    showView('meetgreet');
    return;
  }

  // Returning kid — load full context before routing to chat
  learnerProfile = lp;

  const today = new Date().toISOString().split('T')[0];
  const [summaryRes, examRes, notesRes, materialsRes] = await Promise.all([
    supabase.from('session_summaries').select('*')
      .eq('kid_id', kid.id)
      .order('started_at', { ascending: false })
      .limit(5),
    supabase.from('exams').select('*')
      .eq('kid_id', kid.id)
      .gte('exam_date', today)
      .order('exam_date', { ascending: true }),
    supabase.from('parent_notes').select('note, created_at')
      .eq('kid_id', kid.id)
      .order('created_at', { ascending: false })
      .limit(5),
    supabase.from('study_materials').select('subject, material_summary, file_name')
      .eq('kid_id', kid.id)
      .is('archived_at', null)
      .not('material_summary', 'is', null),
  ]);
  sessionSummaries  = summaryRes.data  || [];
  upcomingExams     = examRes.data     || [];
  parentNotes       = notesRes.data    || [];
  materialSummaries = (materialsRes.data || [])
    .map(m => ({ subject: m.subject, summary: m.material_summary, filename: m.file_name }));

  sessionStartedAt      = new Date().toISOString();
  currentSessionSummary = null;
  lastSummaryAt         = 0;
  sessionEnded          = false;

  document.getElementById('chat-messages').innerHTML = '';
  addQuinnMsg('chat', buildGreeting(kid, lp, sessionSummaries, upcomingExams));
  showView('chat');
}

async function handleSignIn(e) {
  e.preventDefault();
  const errorEl = document.getElementById('signin-error');
  errorEl.textContent = '';
  errorEl.style.color = '';

  const { data, error: authErr } = await supabase.auth.signInWithPassword({
    email:    document.getElementById('signin-email').value.trim(),
    password: document.getElementById('signin-password').value,
  });
  if (authErr) { errorEl.textContent = authErr.message; return; }

  await routeUser(data.user.id, errorEl);
}

function buildGreeting(kid, lp, summaries, exams) {
  const name = kid.name;
  const pj   = lp.profile_json || {};
  const last  = summaries[0];

  if (last?.mood_close === 'stressed' || last?.mood_close === 'anxious') {
    return `Hey ${name}. How are you feeling today?`;
  }
  if (exams.length > 0) {
    const next    = exams[0];
    const dateStr = new Date(next.exam_date + 'T12:00:00')
      .toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    return `Hey ${name}! You've got ${next.subject} on ${dateStr}. Want to work on that, or something else on your mind?`;
  }
  const interests = pj.interests;
  if (Array.isArray(interests) && interests.length > 0) {
    return `Hey ${name}! Good to see you. Still into ${interests[0]}?`;
  }
  return `Hey ${name}! What's going on?`;
}

// ── Chat ──────────────────────────────────────────────────────────────────────
function msgTime() {
  const n = new Date();
  return `${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`;
}

function addQuinnMsg(view, text) {
  const container = document.getElementById(view === 'chat' ? 'chat-messages' : 'mg-messages');
  const d = document.createElement('div');
  d.className = 'msg-quinn';
  d.innerHTML = `<div class="msg-text">${text}</div><div class="msg-time">${msgTime()}</div>`;
  container.appendChild(d);
  container.scrollTop = container.scrollHeight;
  setQuinnState('listening');
}

function addKidMsg(view, text) {
  const container = document.getElementById(view === 'chat' ? 'chat-messages' : 'mg-messages');
  const d = document.createElement('div');
  d.className = 'msg-kid';
  d.innerHTML = `<div class="msg-text">${text}</div><div class="msg-time">${msgTime()}</div>`;
  container.appendChild(d);
  container.scrollTop = container.scrollHeight;
  setQuinnState('engaged');
}

function addThinking(view) {
  const container = document.getElementById(view === 'chat' ? 'chat-messages' : 'mg-messages');
  const d = document.createElement('div');
  d.className = 'msg-thinking';
  d.id = view + '-thinking';
  d.innerHTML = `<div class="thinking-dots"><span></span><span></span><span></span></div>`;
  container.appendChild(d);
  container.scrollTop = container.scrollHeight;
  setQuinnState('curious');
  return d;
}

async function sendMessage(view) {
  if (isSending) return;

  const inputId = view === 'chat' ? 'chat-input' : 'mg-input';
  const input   = document.getElementById(inputId);
  const text    = input.value.trim();
  if (!text) return;

  isSending = true;
  input.value = '';
  input.style.height = 'auto';
  addKidMsg(view, text);

  const thinking = addThinking(view);
  const history  = view === 'chat' ? conversationHistory : mgConversationHistory;

  try {
    const body = {
      message:              text,
      kid_id:               currentKidRecord?.id ?? null,
      learner_profile:      learnerProfile?.profile_json ?? null,
      session_summaries:    sessionSummaries,
      exams:                upcomingExams,
      conversation_history: [...history],
      parent_notes:         parentNotes,
      material_summaries:   materialSummaries,
    };
    if (view === 'mg') body.is_first_meeting = true;

    const { data: { session } } = await supabase.auth.getSession();
    const authHeader = session?.access_token
      ? { Authorization: `Bearer ${session.access_token}` }
      : { Authorization: `Bearer ${SUPABASE_ANON_KEY}` };

    const { data, error } = await supabase.functions.invoke('chat', { body, headers: authHeader });

    thinking.remove();

    if (error || !data?.response) {
      addQuinnMsg(view, "Quinn seems distracted right now — try again in a second");
    } else {
      const response = data.response;
      addQuinnMsg(view, response);

      // Update in-memory history
      history.push({ role: 'user',      content: text     });
      history.push({ role: 'assistant', content: response });

      // Cap at 20 messages (10 pairs) — trim oldest pair first
      if (history.length > 20) {
        const trimCount = history.length - 20;
        history.splice(0, trimCount);
        if (view === 'chat') lastSummaryAt = Math.max(0, lastSummaryAt - trimCount);
      }

      // Quinn animation state — celebrating > curious > listening
      if (/[!]/.test(response) && /great|amazing|awesome|nice|perfect|incredible|love/i.test(response)) {
        setQuinnState('celebrating');
      } else if (/\?/.test(response.slice(-80))) {
        setQuinnState('curious');
      } else {
        setQuinnState('listening');
      }

      // Session summary: fire-and-forget every 5 exchanges (10 messages) in chat view
      if (view === 'chat' && conversationHistory.length > 0 && conversationHistory.length % 10 === 0) {
        writeSummary(false); // intentionally not awaited
      }

      // Reset inactivity timer after each full exchange in chat view
      if (view === 'chat') resetInactivityTimer();

      // Meet & greet: count exchanges and save profile after 8 user turns
      if (view === 'mg') {
        mgExchangeCount++;
        if (mgExchangeCount >= 8 && !mgProfileSaved) {
          mgProfileSaved = true;
          await saveMeetGreetProfile();
        }
      }
    }
  } catch (err) {
    console.error('sendMessage error:', err);
    thinking.remove();
    addQuinnMsg(view, "Quinn seems distracted right now — try again in a second");
  } finally {
    isSending = false;
  }
}

// After 8+ meet & greet exchanges, write a minimal initial learner_profile
// and route the kid to the main chat view.
async function saveMeetGreetProfile() {
  const initialProfile = {
    stable: {
      name:  currentKidRecord.name,
      age:   currentKidRecord.age,
      grade: currentKidRecord.grade,
    },
    current_state: {
      current_stressors:  [],
      exam_anxiety_level: 'unknown',
      last_session_mood:  'first_meeting',
    },
    observed_patterns: {
      communication_style:          'unknown',
      explanation_style_that_works: [],
      what_to_avoid:                [],
      frustration_signal:           'unknown',
      encouragement_style:          'unknown',
    },
    academic: {
      strong_subjects: [],
      weak_subjects:   [],
      specific_gaps:   [],
    },
    interests: [],
  };

  const { error: profileSaveError } = await supabase.from('learner_profiles').upsert({
    kid_id:       currentKidRecord.id,
    profile_json: initialProfile,
    updated_at:   new Date().toISOString(),
  }, { onConflict: 'kid_id' });
  if (profileSaveError) console.error('[Quinn] learner_profiles upsert failed:', profileSaveError);

  // Update in-memory state so the chat view has a profile to work with
  learnerProfile = { kid_id: currentKidRecord.id, profile_json: initialProfile };

  // Carry the MG conversation seamlessly into the chat view —
  // the kid should feel zero discontinuity. Profile save is invisible.
  conversationHistory = [...mgConversationHistory];
  lastSummaryAt       = conversationHistory.length; // don't re-summarize what's already happened
  mgConversationHistory = [];
  mgExchangeCount       = 0;

  sessionStartedAt      = new Date().toISOString();
  currentSessionSummary = null;
  sessionEnded          = false;

  // Move the visual messages from MG container into the chat container
  const mgMessages   = document.getElementById('mg-messages');
  const chatMessages = document.getElementById('chat-messages');
  chatMessages.innerHTML = '';
  while (mgMessages.firstChild) chatMessages.appendChild(mgMessages.firstChild);

  showView('chat');
  resetInactivityTimer();
}

// ── Session summary & profile update ─────────────────────────────────────────

function resetInactivityTimer() {
  if (inactivityTimer) clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(() => writeSummary(true), SESSION_INACTIVITY_MS);
}

async function writeSummary(isFinal) {
  if (!currentKidRecord) return;
  if (isFinal && sessionEnded) return;

  const segment = conversationHistory.slice(lastSummaryAt);

  // Non-final writes need at least 3 exchanges (6 messages) to be worth the API call
  if (!isFinal && segment.length < 6) return;

  try {
    // Call summarize Edge Function if there is new content to process
    if (segment.length > 0) {
      const { data, error } = await supabase.functions.invoke('summarize', {
        body: {
          kid_id:               currentKidRecord.id,
          conversation_segment: segment,
          existing_summary:     currentSessionSummary,
          learner_profile:      learnerProfile?.profile_json ?? null,
        },
      });

      if (!error && data?.summary) {
        currentSessionSummary = data.summary;
        lastSummaryAt         = conversationHistory.length;
      }
    }

    if (isFinal) {
      sessionEnded = true;
      if (inactivityTimer) { clearTimeout(inactivityTimer); inactivityTimer = null; }

      if (currentSessionSummary) {
        const endedAt     = new Date().toISOString();
        const durationMin = sessionStartedAt
          ? Math.round((Date.now() - new Date(sessionStartedAt).getTime()) / 60000)
          : null;

        await supabase.from('session_summaries').insert({
          kid_id:              currentKidRecord.id,
          started_at:          sessionStartedAt || endedAt,
          ended_at:            endedAt,
          duration_minutes:    durationMin,
          mood_open:           currentSessionSummary.mood_open ?? null,
          mood_close:          currentSessionSummary.mood_close ?? null,
          subjects_touched:    currentSessionSummary.subjects_touched ?? [],
          academic_notes:      currentSessionSummary.academic_notes ?? null,
          personal_notes:      currentSessionSummary.personal_notes ?? null,
          readiness_estimate:  currentSessionSummary.readiness_estimate ?? null,
          communication_notes: currentSessionSummary.communication_notes ?? null,
        });

        await updateProfile();
      }
    }
  } catch (err) {
    console.error('writeSummary error:', err);
  }
}

async function updateProfile() {
  if (!currentKidRecord || !currentSessionSummary) return;

  try {
    const { data, error } = await supabase.functions.invoke('update-profile', {
      body: {
        kid_id:          currentKidRecord.id,
        current_profile: learnerProfile?.profile_json ?? null,
        session_summary: currentSessionSummary,
      },
    });

    if (error || !data?.profile) return;

    // Upsert updated profile to Supabase
    await supabase.from('learner_profiles').upsert({
      kid_id:       currentKidRecord.id,
      profile_json: data.profile,
      updated_at:   new Date().toISOString(),
    });

    // Update in-memory state
    if (learnerProfile) {
      learnerProfile.profile_json = data.profile;
    } else {
      learnerProfile = { kid_id: currentKidRecord.id, profile_json: data.profile };
    }
  } catch (err) {
    console.error('updateProfile error:', err);
  }
}

function handleKey(e, view) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(view); }
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 96) + 'px';
}

// ── Parent dashboard ──────────────────────────────────────────────────────────

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

async function loadParentDashboard() {
  const bodyEl = document.getElementById('parent-body');
  bodyEl.innerHTML = '<div class="parent-loading">Loading…</div>';

  const { data: { user } } = await supabase.auth.getUser();
  if (!user) return;

  const { data: kids, error } = await supabase
    .from('kids').select('*').eq('parent_id', user.id).order('name');

  if (error || !kids?.length) {
    bodyEl.innerHTML = '<div class="parent-loading">No kids found — add kid accounts in Supabase.</div>';
    return;
  }

  parentKids = kids;
  parentData = {};

  const today = new Date().toISOString().split('T')[0];

  await Promise.all(parentKids.map(async (kid) => {
    const [profileRes, summaryRes, examRes, materialRes, noteRes] = await Promise.all([
      supabase.from('learner_profiles').select('*').eq('kid_id', kid.id).single(),
      supabase.from('session_summaries').select('*').eq('kid_id', kid.id)
        .order('started_at', { ascending: false }).limit(3),
      supabase.from('exams').select('*').eq('kid_id', kid.id)
        .gte('exam_date', today).is('archived_at', null)
        .order('exam_date', { ascending: true }),
      supabase.from('study_materials').select('*').eq('kid_id', kid.id)
        .is('archived_at', null).order('uploaded_at', { ascending: false }),
      supabase.from('parent_notes').select('*').eq('kid_id', kid.id)
        .order('created_at', { ascending: false }).limit(3),
    ]);
    parentData[kid.id] = {
      kid,
      profile:   profileRes.data  || null,
      summaries: summaryRes.data  || [],
      exams:     examRes.data     || [],
      materials: materialRes.data || [],
      notes:     noteRes.data     || [],
    };
  }));

  renderParentDashboard();
}

function renderParentDashboard() {
  const bodyEl = document.getElementById('parent-body');
  bodyEl.innerHTML = '';

  // Kid sections
  const kidsWrap = document.createElement('div');
  const kidsLabel = document.createElement('div');
  kidsLabel.className = 'section-label';
  kidsLabel.textContent = 'Kids';
  kidsWrap.appendChild(kidsLabel);

  const kidSections = document.createElement('div');
  kidSections.className = 'kid-sections';
  parentKids.forEach(kid => kidSections.appendChild(renderKidSection(parentData[kid.id])));
  kidsWrap.appendChild(kidSections);
  bodyEl.appendChild(kidsWrap);

  // Aggregate upcoming exams
  const allExamsWrap = document.createElement('div');
  allExamsWrap.id = 'all-exams-section';
  bodyEl.appendChild(allExamsWrap);
  renderAllExams();
}

function renderAllExams() {
  const wrap = document.getElementById('all-exams-section');
  if (!wrap) return;

  const allExams = [];
  parentKids.forEach(kid => {
    (parentData[kid.id]?.exams || []).forEach(e => allExams.push({ ...e, kidName: kid.name }));
  });
  allExams.sort((a, b) => new Date(a.exam_date) - new Date(b.exam_date));

  wrap.innerHTML = '';
  if (allExams.length === 0) return;

  const label = document.createElement('div');
  label.className = 'section-label';
  label.textContent = 'Upcoming Exams';
  wrap.appendChild(label);

  const list = document.createElement('div');
  list.className = 'exam-list';
  allExams.slice(0, 10).forEach(e => {
    const dateStr = new Date(e.exam_date + 'T12:00:00')
      .toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toUpperCase();
    const item = document.createElement('div');
    item.className = 'exam-item';
    item.innerHTML = `<span class="exam-date">${dateStr}</span>`
      + `<span class="exam-subject">${escHtml(e.subject)}${e.exam_type ? ` — ${escHtml(e.exam_type)}` : ''}</span>`
      + `<span class="exam-who">${escHtml(e.kidName)}</span>`;
    list.appendChild(item);
  });
  wrap.appendChild(list);
}

function renderKidSection(d) {
  if (!d) return document.createElement('div');
  const { kid, profile, summaries, exams } = d;
  const pj = profile?.profile_json || {};

  // Readiness bars — prefer readiness_estimate from most recent summary
  const readiness = {};
  const latestSummary = summaries[0];
  if (latestSummary?.readiness_estimate && typeof latestSummary.readiness_estimate === 'object') {
    Object.entries(latestSummary.readiness_estimate).forEach(([subj, score]) => {
      readiness[subj] = Math.round((Number(score) / 5) * 100);
    });
  }
  if (Object.keys(readiness).length === 0 && pj.academic) {
    (pj.academic.strong_subjects || []).forEach(s => { readiness[s] = 75; });
    (pj.academic.weak_subjects   || []).forEach(s => { if (!readiness[s]) readiness[s] = 35; });
  }

  // Last active
  let lastActive = 'No sessions yet';
  const rawDate = pj.current_state?.last_active || kid.last_active_at;
  if (rawDate) {
    const d2 = new Date(rawDate);
    const diffDays = Math.floor((Date.now() - d2.getTime()) / 86400000);
    if (diffDays === 0)      lastActive = 'Active today';
    else if (diffDays === 1) lastActive = 'Active yesterday';
    else if (diffDays < 7)  lastActive = `Active ${diffDays} days ago`;
    else                    lastActive = `Last active ${d2.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;
  }

  // Readiness bars HTML
  let barsHTML = '';
  Object.entries(readiness).slice(0, 4).forEach(([subj, pct]) => {
    barsHTML += `<div class="subject-row">
      <span class="subject-label">${escHtml(subj)}</span>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
      <span class="bar-pct">${pct}%</span>
    </div>`;
  });

  // Upcoming exam pills (next 2)
  let pillsHTML = '';
  if (exams.length > 0) {
    pillsHTML = '<div class="exam-pills">';
    exams.slice(0, 2).forEach(e => {
      const ds = new Date(e.exam_date + 'T12:00:00')
        .toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      pillsHTML += `<span class="exam-pill">${ds} · ${escHtml(e.subject)}</span>`;
    });
    pillsHTML += '</div>';
  }

  const section = document.createElement('div');
  section.className = 'kid-section';
  section.id = `kid-section-${kid.id}`;

  // Card
  const card = document.createElement('div');
  card.className = 'kid-card';
  card.id = `kid-card-${kid.id}`;
  card.innerHTML = `
    <div class="kid-card-header">
      <div>
        <div class="kid-card-name">${escHtml(kid.name)}</div>
        <div class="kid-card-meta">Age ${kid.age} · Grade ${escHtml(kid.grade)}</div>
      </div>
      <button class="btn-detail-toggle" id="toggle-btn-${kid.id}" onclick="toggleKidDetail('${kid.id}')">Details</button>
    </div>
    ${barsHTML}
    ${pillsHTML}
    <div class="kid-card-last">${lastActive}</div>`;
  section.appendChild(card);

  // Expandable detail panel (hidden by default)
  const detail = document.createElement('div');
  detail.className = 'kid-detail';
  detail.id = `kid-detail-${kid.id}`;
  detail.hidden = true;
  detail.innerHTML = buildKidDetailHTML(d);
  section.appendChild(detail);

  return section;
}

async function addExam(kidId) {
  const subject  = document.getElementById(`exam-subject-${kidId}`).value.trim();
  const examType = document.getElementById(`exam-type-${kidId}`).value;
  const examDate = document.getElementById(`exam-date-${kidId}`).value;
  const notes    = document.getElementById(`exam-notes-${kidId}`).value.trim();
  if (!subject || !examDate) return;

  const { data, error } = await supabase.from('exams').insert({
    kid_id: kidId, subject, exam_type: examType,
    exam_date: examDate, notes: notes || null,
  }).select().single();
  if (error || !data) return;

  parentData[kidId].exams.push(data);
  parentData[kidId].exams.sort((a, b) => new Date(a.exam_date) - new Date(b.exam_date));

  document.getElementById(`exam-subject-${kidId}`).value = '';
  document.getElementById(`exam-date-${kidId}`).value   = '';
  document.getElementById(`exam-notes-${kidId}`).value  = '';
  toggleAddExamForm(kidId);

  refreshExamList(kidId);
  renderAllExams();
}

async function deleteExam(examId, kidId) {
  const { error } = await supabase.from('exams')
    .update({ archived_at: new Date().toISOString() }).eq('id', examId);
  if (error) return;
  parentData[kidId].exams = parentData[kidId].exams.filter(e => e.id !== examId);
  refreshExamList(kidId);
  renderAllExams();
}

function refreshExamList(kidId) {
  const listEl = document.getElementById(`exam-mgmt-list-${kidId}`);
  if (!listEl) return;

  if (exams.length === 0) {

async function uploadMaterial(kidId) {
  const fileInput  = document.getElementById(`material-file-${kidId}`);
  const subjInput  = document.getElementById(`material-subject-${kidId}`);
  const statusEl   = document.getElementById(`upload-status-${kidId}`);
  const file       = fileInput.files[0];
  const subject    = subjInput.value.trim();

  if (!file || !subject) {
    statusEl.textContent = 'Select a PDF and enter a subject.';
    return;
  }

  statusEl.textContent = 'Uploading…';

  try {
    // 1. Upload to Supabase Storage
    const storagePath = `${kidId}/${subject}/${file.name}`;
    const { error: storageErr } = await supabase.storage
      .from('study-materials').upload(storagePath, file, { upsert: true });
    if (storageErr) throw storageErr;

    const { data: urlData } = supabase.storage.from('study-materials').getPublicUrl(storagePath);
    const fileUrl = urlData?.publicUrl || '';

    // 2. Convert PDF to base64 (chunked to avoid call stack limits)
    statusEl.textContent = 'Processing with Claude…';
    const arrayBuffer = await file.arrayBuffer();
    const bytes = new Uint8Array(arrayBuffer);
    let binary = '';
    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    const pdfBase64 = btoa(binary);

    // 3. Call ingest-material edge function
    const profile = parentData[kidId]?.profile?.profile_json || null;
    const { data: ingestData, error: ingestErr } = await supabase.functions.invoke('ingest-material', {
      body: { kid_id: kidId, subject, pdf_base64: pdfBase64, filename: file.name, learner_profile: profile },
    });
    if (ingestErr) throw ingestErr;

    // 4. Insert study_materials record
    const { data: matData, error: matErr } = await supabase.from('study_materials').insert({
      kid_id: kidId, subject, source_type: 'pdf',
      file_url: fileUrl, file_name: file.name,
      material_summary: ingestData?.summary || null,
    }).select().single();
    if (matErr) throw matErr;

    parentData[kidId].materials.unshift(matData);
    refreshMaterialList(kidId);
    fileInput.value = '';
    subjInput.value = '';
    statusEl.textContent = 'Uploaded successfully.';
    setTimeout(() => { statusEl.textContent = ''; }, 3000);
  } catch (err) {
    console.error('uploadMaterial error:', err);
    statusEl.textContent = 'Upload failed — check console.';
  }
}

  parentData[kidId].materials = parentData[kidId].materials.filter(m => m.id !== materialId);

async function saveParentNote(kidId) {

// ── Quinn state ───────────────────────────────────────────────────────────────
let quinnState = 'listening';
function setQuinnState(s) { quinnState = s; }

// ── Möbius animation ──────────────────────────────────────────────────────────
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function cross(a,b){return[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]];}
function dot(a,b){return a[0]*b[0]+a[1]*b[1]+a[2]*b[2];}
function norm(v){const m=Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2])||1;return[v[0]/m,v[1]/m,v[2]/m];}

const MCFG = {
  listening:   {rotSpeedY:0.30,rotXTarget:0.38,rotXWobble:0.08,flowSpeed:0.55,hue:200,sat:52,lit:50,glowAlpha:0.12,glowR:175,stripAlpha:0.82,edgeAlpha:0.60,edgeGlow:8, R:132,W:27,cycleSpeed:9, pulseAmp:7, pulseSpeed:0.85},
  curious:     {rotSpeedY:0.58,rotXTarget:0.44,rotXWobble:0.12,flowSpeed:1.10,hue:185,sat:62,lit:54,glowAlpha:0.16,glowR:185,stripAlpha:0.88,edgeAlpha:0.72,edgeGlow:12,R:135,W:30,cycleSpeed:18,pulseAmp:12,pulseSpeed:1.40},
  engaged:     {rotSpeedY:1.15,rotXTarget:0.52,rotXWobble:0.18,flowSpeed:2.80,hue:42, sat:82,lit:62,glowAlpha:0.26,glowR:195,stripAlpha:0.96,edgeAlpha:0.88,edgeGlow:20,R:140,W:33,cycleSpeed:36,pulseAmp:20,pulseSpeed:2.60},
  celebrating: {rotSpeedY:2.20,rotXTarget:0.62,rotXWobble:0.28,flowSpeed:4.50,hue:38, sat:92,lit:70,glowAlpha:0.40,glowR:210,stripAlpha:0.99,edgeAlpha:0.95,edgeGlow:32,R:148,W:39,cycleSpeed:60,pulseAmp:28,pulseSpeed:3.80},
  soft:        {rotSpeedY:0.09,rotXTarget:0.25,rotXWobble:0.03,flowSpeed:0.18,hue:270,sat:26,lit:43,glowAlpha:0.06,glowR:155,stripAlpha:0.52,edgeAlpha:0.32,edgeGlow:4, R:124,W:21,cycleSpeed:2, pulseAmp:3, pulseSpeed:0.20},
  sad:         {rotSpeedY:0.06,rotXTarget:0.18,rotXWobble:0.02,flowSpeed:0.10,hue:222,sat:28,lit:36,glowAlpha:0.05,glowR:140,stripAlpha:0.42,edgeAlpha:0.22,edgeGlow:3, R:121,W:20,cycleSpeed:1, pulseAmp:3, pulseSpeed:0.14},
};

let mL={...MCFG.listening}, mHue=200, mRotY=0, mRotX=0.38;
const N_U=160, N_V=10;
const PARAMS=(()=>{
  const p=[];
  for(let i=0;i<=N_U;i++){p[i]=[];for(let j=0;j<=N_V;j++)p[i][j]={u:(i/N_U)*Math.PI*2,v:-1+(j/N_V)*2};}
  return p;
})();

function mobiusPt(u,v,R){return[(R+v*Math.cos(u/2))*Math.cos(u),(R+v*Math.cos(u/2))*Math.sin(u),v*Math.sin(u/2)];}
function rY(p,a){return[p[0]*Math.cos(a)-p[2]*Math.sin(a),p[1],p[0]*Math.sin(a)+p[2]*Math.cos(a)];}
function rX(p,a){return[p[0],p[1]*Math.cos(a)-p[2]*Math.sin(a),p[1]*Math.sin(a)+p[2]*Math.cos(a)];}
function proj(p,fov=420){const s=fov/(fov+p[2]+120);return[210+p[0]*s,210+p[1]*s,p[2]];}

const cv   = document.getElementById('quinn-cv');
const mctx = cv.getContext('2d');
const MLIGHT = norm([0.5,-0.7,0.8]);

function drawMobius(t, dt) {
  const tgt = MCFG[quinnState];
  for (const k in mL) mL[k] = lerp(mL[k], tgt[k], 0.035);
  mHue = (mHue + dt * mL.cycleSpeed) % 360;
  mRotY += dt * mL.rotSpeedY;
  mRotX = lerp(mRotX, mL.rotXTarget + Math.sin(t*0.19)*mL.rotXWobble, 0.02);

  // Sync UI accent to Quinn's live hue — the whole interface breathes with Quinn
  const h = mHue|0, s = mL.sat|0, l = mL.lit|0;
  const root = document.documentElement.style;
  root.setProperty('--accent',        `hsl(${h},${s}%,${l}%)`);
  root.setProperty('--accent-dim',    `hsl(${h},${(s*.45)|0}%,15%)`);
  root.setProperty('--accent-subtle', `hsl(${h},${(s*.3)|0}%,11%)`);

  mctx.clearRect(0,0,420,420);
  const hsl  = (a)    => `hsla(${h},${s}%,${l}%,${a})`;
  const hslB = (bl,a) => `hsla(${h},${s}%,${bl}%,${a})`;

  const bg = mctx.createRadialGradient(210,210,0,210,210,mL.glowR);
  bg.addColorStop(0,   hsl(mL.glowAlpha));
  bg.addColorStop(0.6, hsl(mL.glowAlpha*0.4));
  bg.addColorStop(1,   'rgba(0,0,0,0)');
  mctx.fillStyle = bg; mctx.fillRect(0,0,420,420);

  const R = mL.R + Math.sin(t*mL.pulseSpeed)*mL.pulseAmp;
  const W = mL.W;
  const p2=[], p3=[];
  for(let i=0;i<=N_U;i++){
    p2[i]=[]; p3[i]=[];
    for(let j=0;j<=N_V;j++){
      const {u,v}=PARAMS[i][j];
      const r2=rX(rY(mobiusPt(u,v*W,R),mRotY),mRotX);
      p3[i][j]=r2; p2[i][j]=proj(r2);
    }
  }

  const fp=t*mL.flowSpeed, quads=[];
  for(let i=0;i<N_U;i++){
    for(let j=0;j<N_V;j++){
      const q00=p3[i][j],q10=p3[i+1][j],q11=p3[i+1][j+1],q01=p3[i][j+1];
      const d1=[q11[0]-q00[0],q11[1]-q00[1],q11[2]-q00[2]];
      const d2=[q10[0]-q01[0],q10[1]-q01[1],q10[2]-q01[2]];
      const ld = Math.abs(dot(norm(cross(d1,d2)), MLIGHT));
      const uC = ((i+0.5)/N_U)*Math.PI*2;
      const glow = Math.pow(clamp(Math.sin(uC*2-fp),0,1),1.8);
      const zC=(p2[i][j][2]+p2[i+1][j][2]+p2[i+1][j+1][2]+p2[i][j+1][2])/4;
      quads.push({p00:p2[i][j],p10:p2[i+1][j],p11:p2[i+1][j+1],p01:p2[i][j+1],z:zC,ld,glow,edge:j===0||j===N_V-1});
    }
  }
  quads.sort((a,b)=>a.z-b.z);

  quads.forEach(q=>{
    const {p00,p10,p11,p01,ld,glow,edge}=q;
    const br=l+ld*18+glow*24;
    mctx.beginPath();
    mctx.moveTo(p00[0],p00[1]); mctx.lineTo(p10[0],p10[1]);
    mctx.lineTo(p11[0],p11[1]); mctx.lineTo(p01[0],p01[1]);
    mctx.closePath();
    mctx.fillStyle=hslB(clamp(br,20,92), mL.stripAlpha*(0.35+ld*0.35+glow*0.30));
    mctx.fill();
    if(edge){
      mctx.strokeStyle=hslB(clamp(br+12,40,96), mL.edgeAlpha*(0.4+glow*0.6));
      mctx.lineWidth=1.5;
      mctx.shadowColor=hslB(clamp(br+12,40,96),0.9);
      mctx.shadowBlur=mL.edgeGlow*(0.3+glow*0.7);
      mctx.stroke(); mctx.shadowBlur=0;
    }
  });

  const pi=Math.round(((fp%(Math.PI*2))/(Math.PI*2))*N_U)%N_U, mj=N_V>>1;
  if(p2[pi]?.[mj]){
    const[px,py]=p2[pi][mj];
    const gp=mctx.createRadialGradient(px,py,0,px,py,34);
    gp.addColorStop(0,   hslB(Math.min(l+35,95),0.85));
    gp.addColorStop(0.5, hslB(l+20,0.30));
    gp.addColorStop(1,   'rgba(0,0,0,0)');
    mctx.beginPath(); mctx.arc(px,py,34,0,Math.PI*2);
    mctx.fillStyle=gp; mctx.fill();
  }
}

// ── Init & loop ───────────────────────────────────────────────────────────────
// Place Quinn on sign-in stage
const signinStage = document.getElementById('signin-stage');
signinStage.appendChild(cv);
cv.style.width = cv.style.height = STAGES.signin.size();
mRotX = MCFG.listening.rotXTarget;

let tPrev=0, elapsed=0;
function loop(stamp) {
  const dt = Math.min((stamp-tPrev)/1000, 0.05);
  tPrev=stamp; elapsed+=dt;
  drawMobius(elapsed, dt);
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{ tPrev=ts; requestAnimationFrame(loop); });

// ── Service worker — always-fresh, no stale cache ─────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/Quinn/sw.js', { scope: '/Quinn/' })
    .catch(err => console.warn('SW registration failed:', err));
}
</script>
